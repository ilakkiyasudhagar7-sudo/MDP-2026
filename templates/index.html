            transition: all 0.2s;
        }
        .cta-button:hover { 
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(102,126,234,0.3);
        }

            display: none; 
            padding: 0 40px 40px;

        .weather-city {
