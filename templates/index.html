<!DOCTYPE html>
<html>
<head>
    <title>Outfit Recommender</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .input-section { 
            background: white; 
            border-radius: 20px; 
            padding: 40px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center; 
            margin-bottom: 30px;
        }
        .form-group { display: flex; gap: 20px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
        input, select { 
            padding: 15px; 
            border: 2px solid #e1e5e9; 
            border-radius: 12px; 
            font-size: 16px; 
            width: 250px; 
            background: #f8f9fa;
        }
        .btn { 
            background: linear-gradient(45deg, #ff6b9d, #c44569); 
            color: white; 
            border: none; 
            padding: 15px 40px; 
            border-radius: 12px; 
            font-size: 16px; 
            cursor: pointer; 
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }

        .weather-card { 
            background: white; 
            border-radius: 20px; 
            padding: 30px; 
            text-align: center; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin: 20px 0;
        }
        .comfort-score { 
            font-size: 4rem; 
            background: linear-gradient(45deg, #4ecdc4, #44a08d); 
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: bold;
            margin: 10px 0;
        }

        .cards-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
            gap: 20px; 
            margin-top: 30px;
        }
        .card { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            text-decoration: none; 
            color: inherit;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 25px 50px rgba(0,0,0,0.15); }
        .card img { 
            width: 100%; 
            height: 180px; 
            background: #f0f0f0; 
            object-fit: cover; 
        }
        .card-title { 
            padding: 15px; 
            font-weight: bold; 
            text-align: center; 
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="input-section">
            <h1 style="color: #333; margin-bottom: 30px;">Outfit Recommender</h1>
            
            <form method="POST">
                <div class="form-group">
                    <input type="text" name="place" placeholder="Enter city (e.g., Chennai)" value="{{ place }}" required>
                    <select name="gender" required>
                        <option value="women" {% if gender == 'women' %}selected{% endif %}>Women</option>
                        <option value="men" {% if gender == 'men' %}selected{% endif %}>Men</option>
                    </select>
                </div>
                <button type="submit" class="btn">Get My Outfits ✨</button>
            </form>
        </div>

        {% if comfort %}
        <div class="weather-card">
            <h2>{{ place.capitalize() }} Weather</h2>
            <p>Temperature: 26°C | Comfort Score: {{ comfort }}/10</p>
            <div class="comfort-score">{{ comfort }}/10</div>
            <p style="color: #666; font-size: 18px;">{{ category_count }} {{ gender }} modest options</p>
        </div>

        <div class="cards-grid">
            {% for cat in categories %}
            <a class="card" href="/category/{{ cat }}">
                <img src="/static/images/{{ gender }}/{{ cat }}/1.jpg" alt="{{ cat }}">
                <div class="card-title">{{ cat.replace('_', ' ').title() }}</div>
            </a>
            {% endfor %}
        </div>
        {% endif %}
    </div>
</body>
</html>
