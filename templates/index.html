<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather Based Outfit Recommender</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:40px;
border-radius:20px;
width:420px;
text-align:center;
box-shadow:0 20px 40px rgba(0,0,0,0.2);
color:white;
}

h1{
margin-bottom:25px;
font-size:2rem;
}

input,select{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
font-size:15px;
}

button{
width:100%;
padding:12px;
background:#ff6b9d;
border:none;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
transition:0.2s;
}

button:hover{
transform:translateY(-2px);
background:#ff4d88;
}

.weather-box{
background:white;
color:#333;
margin-top:25px;
padding:20px;
border-radius:15px;
}

.weather-box p{
margin:6px 0;
font-size:16px;
}

.categories{
margin-top:15px;
}

.categories a{
display:block;
margin:8px 0;
padding:10px;
background:#667eea;
color:white;
text-decoration:none;
border-radius:8px;
transition:0.2s;
}

.categories a:hover{
background:#5563d1;
}

</style>

</head>

<body>

<div class="container">

<h1>Outfit Recommender</h1>

<form method="POST">

<input name="place" placeholder="Enter your city" required>

<select name="gender">
<option value="women">Women</option>
<option value="men">Men</option>
</select>

<button type="submit">Get Outfit Suggestions</button>

</form>

{% if comfort %}

<div class="weather-box">

<p><strong>Location:</strong> {{place}}</p>
<p><strong>Temperature:</strong> {{temp}} °C</p>
<p><strong>Humidity:</strong> {{humidity}} %</p>
<p><strong>Comfort Score:</strong> {{comfort}}</p>

<div class="categories">

<h3>Recommended Outfits</h3>

{% for c in categories %}

<a href="/category/{{c}}">{{c.replace("_"," ").title()}}</a>

{% endfor %}

</div>

</div>

{% endif %}

</div>

</body>
</html>
