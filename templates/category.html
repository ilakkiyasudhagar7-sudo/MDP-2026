<!DOCTYPE html>
<html>
<head>
    <title>{{ title }} - Modest Outfits</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px; 
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .back-btn { 
            display: inline-block; 
            background: linear-gradient(45deg, #ff6b9d, #c44569); 
            color: white; 
            padding: 12px 24px; 
            border-radius: 12px; 
            text-decoration: none; 
            margin: 30px 0; 
            font-weight: 500;
        }
        
        h1 { 
            text-align: center; 
            color: white; 
            margin: 20px 0; 
            font-size: 2.5rem;
        }
        
        .outfits-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 25px; 
            margin-top: 30px;
        }
        
        .outfit { 
            background: white; 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); 
            transition: transform 0.3s;
        }
        .outfit:hover { transform: translateY(-5px); }
        
        .outfit img { 
            width: 100%; 
            height: 250px; 
            object-fit: cover; 
            background: #f0f0f0;
        }
        
        .outfit-info { 
            padding: 20px; 
            text-align: center;
        }
        
        .outfit-name { 
            font-size: 1.3em; 
            font-weight: bold; 
            margin-bottom: 10px; 
            color: #333;
        }
        
        .price { 
            font-size: 1.2em; 
            color: #e74c3c; 
            font-weight: bold; 
            margin-bottom: 15px;
        }
        
        .buy-btn { 
            background: linear-gradient(45deg, #ff6b9d, #c44569); 
            color: white; 
            border: none; 
            padding: 12px 24px; 
            border-radius: 10px; 
            width: 100%; 
            font-size: 16px; 
            cursor: pointer; 
            font-weight: 500;
            transition: transform 0.2s;
        }
        .buy-btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-btn">← Back to Recommendations</a>
        <h1>{{ title }}</h1>
        
        <div class="outfits-grid">
            {% for item in items %}
            <div class="outfit">
                <img src="/static/images/{{ title.lower() }}/{{ loop.index }}.jpg" alt="{{ item.name }}">
                <div class="outfit-info">
                    <div class="outfit-name">{{ item.name }}</div>
                    <div class="price">{{ item.price }}</div>
                    <a href="/buy?url={{ item.link }}" target="_blank">
                    <button>Buy Now</button>
                    </a>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
